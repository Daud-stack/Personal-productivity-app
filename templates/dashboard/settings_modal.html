<div
  class="modal fade"
  id="settingsModal"
  tabindex="-1"
  aria-labelledby="settingsModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="settingsModalLabel">Settings</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form
        action="{{ url_for('dashboard.update_settings') }}"
        method="post"
        id="settingsForm"
        class="form-with-feedback"
      >
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="modal-body">
          <div class="mb-4">
            <h6 class="mb-3">Financial Goal</h6>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="goal_amount" class="form-label"
                  >Target Amount ($)</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="goal_amount"
                  name="goal_amount"
                  value="{{ settings.get('goal_amount', 600) }}"
                  min="1"
                  step="1"
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="current_amount" class="form-label"
                  >Current Amount ($)</label
                >
                <input
                  type="number"
                  class="form-control"
                  id="current_amount"
                  name="current_amount"
                  value="{{ settings.get('current_amount', 270) }}"
                  min="0"
                  step="1"
                  required
                />
              </div>
              <div class="col-12">
                <label for="goal_date" class="form-label">Target Date</label>
                <input
                  type="date"
                  class="form-control"
                  id="goal_date"
                  name="goal_date"
                  value="{{ settings.get('goal_date', '2026-05-31') }}"
                  required
                />
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
