<div class="modal fade" id="editWeekModal" tabindex="-1" aria-labelledby="editWeekModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editWeekModalLabel">Edit Week</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="{{ url_for('dashboard.edit_week') }}" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <input type="hidden" id="edit_week_id" name="week_id" value="" />
        <div class="modal-body">
          <div class="mb-3">
            <label for="edit_health" class="form-label">Health (%)</label>
            <input type="number" class="form-control" id="edit_health" name="health" min="0" max="100" required />
          </div>
          <div class="mb-3">
            <label for="edit_career" class="form-label">Career (%)</label>
            <input type="number" class="form-control" id="edit_career" name="career" min="0" max="100" required />
          </div>
          <div class="mb-3">
            <label for="edit_finance" class="form-label">Finance (%)</label>
            <input type="number" class="form-control" id="edit_finance" name="finance" min="0" max="100" required />
          </div>
          <div class="mb-3">
            <label for="edit_personal" class="form-label">Personal (%)</label>
            <input type="number" class="form-control" id="edit_personal" name="personal" min="0" max="100" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
